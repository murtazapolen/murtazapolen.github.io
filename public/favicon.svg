<svg width="100%" height="100%" viewBox="0 0 100 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bulbGlow" cx="50%" cy="40%" r="60%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fffaf0" stop-opacity="1" />
      <stop offset="20%" stop-color="#ffe066" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.8" />
      <stop offset="90%" stop-color="#d97706" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.95" />
    </radialGradient>
    
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="30%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#fef08a" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="metalBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8c8c8c" />
      <stop offset="25%" stop-color="#d9d9d9" />
      <stop offset="50%" stop-color="#f2f2f2" />
      <stop offset="75%" stop-color="#a6a6a6" />
